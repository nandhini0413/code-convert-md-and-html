<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Markdown and HTML converter tool for developers">
    <meta name="theme-color" content="#6366f1">
    <title>Markdown & HTML Converter</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #7C3AED;
            --secondary-purple: #A855F7;
            --dark-purple: #6D28D9;
            --light-lavender: #EDE9FE;
            --card-background: #FFFFFF;
            --page-background: #F8F7FC;
            --soft-gray: #F3F4F6;
            --border-gray: #E5E7EB;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        :root[data-theme="light"] {
            --primary-purple: #7C3AED;
            --secondary-purple: #A855F7;
            --dark-purple: #6D28D9;
            --light-lavender: #EDE9FE;
            --card-background: #FFFFFF;
            --page-background: #F8F7FC;
            --soft-gray: #F3F4F6;
            --border-gray: #E5E7EB;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--page-background);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ============================================================
           HEADER SECTION
           ============================================================ */
        .header {
            background: var(--card-background);
            border-bottom: 1px solid var(--border-gray);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 0;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
        }

        .header-text h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .header-text p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .header-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .header-tab-btn {
            padding: 0.75rem 1.25rem;
            border: 2px solid var(--border-gray);
            background: var(--card-background);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .header-tab-btn:hover {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
            background: var(--light-lavender);
        }

        .header-tab-btn.active {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .header-tab-btn:focus-visible {
            outline: 2px solid var(--primary-purple);
            outline-offset: 2px;
        }

        /* ============================================================
           MAIN CONTENT SECTION
           ============================================================ */
        .main {
            flex: 1;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ============================================================
           TAB CONTENT
           ============================================================ */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
           CONVERTER WORKSPACE
           ============================================================ */
        .converter-workspace {
            background: var(--card-background);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            min-height: 600px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .panel-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple));
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .editor {
            flex: 1;
            border: 2px solid var(--border-gray);
            border-radius: 10px;
            padding: 1rem;
            font-family: "Fira Code", "Courier New", monospace;
            font-size: 0.9375rem;
            line-height: 1.6;
            resize: none;
            transition: var(--transition);
            background: var(--soft-gray);
            color: var(--text-primary);
        }

        .editor:hover {
            border-color: var(--primary-purple);
            background: var(--card-background);
        }

        .editor:focus {
            outline: none;
            border-color: var(--primary-purple);
            background: var(--card-background);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .editor[readonly] {
            background: var(--light-lavender);
            cursor: not-allowed;
            border-color: var(--border-gray);
        }

        .editor[readonly]:focus {
            box-shadow: none;
        }

        /* ============================================================
           ACTION BAR
           ============================================================ */
        .action-bar {
            display: flex;
            gap: 1rem;
            padding: 0 2rem 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            text-decoration: none;
            justify-content: center;
            min-height: 44px;
        }

        .btn:focus-visible {
            outline: 2px solid var(--deep-purple);
            outline-offset: 2px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-purple));
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--dark-purple), var(--primary-purple));
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--light-lavender);
            color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
        }

        .btn-secondary:hover {
            background: var(--primary-purple);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
        }

        .btn-danger {
            background: #FEE2E2;
            color: #991B1B;
            border: 2px solid #FECACA;
        }

        .btn-danger:hover {
            background: #FECACA;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        :root[data-theme="dark"] .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            border-color: #EF4444;
        }

        :root[data-theme="dark"] .btn-danger:hover {
            background: #EF4444;
            color: white;
        }

        .btn-icon {
            font-size: 1.125rem;
        }

        /* ============================================================
           FEEDBACK MESSAGES
           ============================================================ */
        .notification {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease-out;
            transition: var(--transition);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification.success {
            background: #DCFCE7;
            color: #166534;
            border: 1px solid #BBF7D0;
        }

        .notification.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }

        /* ============================================================
           FOOTER SECTION
           ============================================================ */
        .footer {
            background: var(--card-background);
            border-top: 1px solid var(--border-gray);
            padding: 2rem 1.5rem;
            margin-top: auto;
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .footer-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .footer-icon {
            color: var(--primary-purple);
            font-weight: 700;
        }

        /* ============================================================
           RESPONSIVE DESIGN
           ============================================================ */
        @media (max-width: 1024px) {
            .workspace-grid {
                gap: 1.5rem;
                padding: 1.5rem;
                min-height: auto;
            }

            .header-text h1 {
                font-size: 1.5rem;
            }

            .header-content {
                padding: 1.5rem;
            }

            .header-buttons {
                gap: 0.5rem;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1rem 1.5rem;
            }

            .header-left {
                width: 100%;
            }

            .header-buttons {
                width: 100%;
                justify-content: flex-start;
            }

            .header-tab-btn {
                flex: 1;
                justify-content: center;
            }

            .workspace-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
                padding: 1.5rem;
            }

            .action-bar {
                flex-direction: column;
                padding: 0 1.5rem 1.5rem;
            }

            .btn {
                flex: 1;
            }

            .header-text h1 {
                font-size: 1.25rem;
            }

            .header-text p {
                font-size: 0.875rem;
            }

            .main {
                padding: 1.5rem 1rem;
            }

            .tabs-nav {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .tab-button {
                padding: 0.875rem 1rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                gap: 0.75rem;
                padding: 0.75rem;
            }

            .header-text h1 {
                font-size: 1.125rem;
            }

            .header-text p {
                font-size: 0.8125rem;
                display: none;
            }

            .logo {
                width: 36px;
                height: 36px;
            }

            .header-buttons {
                gap: 0.5rem;
                width: 100%;
            }

            .header-tab-btn {
                flex: 1;
                padding: 0.625rem 0.75rem;
                font-size: 0.8125rem;
            }

            .tabs-nav {
                padding: 0.25rem;
            }

            .tab-button {
                padding: 0.75rem 0.875rem;
                font-size: 0.875rem;
            }

            .tab-icon {
                font-size: 1rem;
            }

            .workspace-grid {
                padding: 1rem;
            }

            .panel-label {
                font-size: 0.875rem;
            }

            .editor {
                padding: 0.75rem;
                font-size: 0.875rem;
            }

            .btn {
                padding: 0.75rem 1rem;
                font-size: 0.9375rem;
            }

            .footer-content {
                font-size: 0.875rem;
            }
        }

        /* ============================================================
           ACCESSIBILITY
           ============================================================ */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary-purple: #8B5CF6;
                --secondary-purple: #A78BFA;
                --dark-purple: #7C3AED;
                --light-lavender: #4C1D95;
                --card-background: #111827;
                --page-background: #0F172A;
                --soft-gray: #1F2937;
                --border-gray: #374151;
                --text-primary: #F9FAFB;
                --text-secondary: #D1D5DB;
            }

            body {
                background: var(--page-background);
            }

            .tab-button:hover {
                background: rgba(139, 92, 246, 0.1);
            }

            .editor {
                background: #1F2937;
                border-color: #374151;
            }

            .editor:hover,
            .editor:focus {
                background: #1F2937;
            }

            .editor[readonly] {
                background: rgba(139, 92, 246, 0.05);
            }
        }

        :root[data-theme="dark"] {
            --primary-purple: #8B5CF6;
            --secondary-purple: #A78BFA;
            --dark-purple: #7C3AED;
            --light-lavender: #4C1D95;
            --card-background: #111827;
            --page-background: #0F172A;
            --soft-gray: #1F2937;
            --border-gray: #374151;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
        }

        :root[data-theme="dark"] body {
            background: var(--page-background);
        }

        :root[data-theme="dark"] .header {
            background: var(--card-background);
            border-color: var(--border-gray);
        }

        :root[data-theme="dark"] .header-tab-btn {
            background: var(--card-background);
            color: var(--text-primary);
            border-color: var(--border-gray);
        }

        :root[data-theme="dark"] .header-tab-btn:hover {
            background: var(--soft-gray);
            border-color: var(--primary-purple);
            color: var(--primary-purple);
        }

        :root[data-theme="dark"] .btn-secondary {
            background: transparent;
            color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        :root[data-theme="dark"] .btn-secondary:hover {
            background: var(--primary-purple);
            color: white;
        }

        :root[data-theme="dark"] .editor {
            background: var(--soft-gray);
            border-color: var(--border-gray);
            color: var(--text-primary);
        }

        :root[data-theme="dark"] .editor:hover {
            background: var(--soft-gray);
            border-color: var(--primary-purple);
        }

        :root[data-theme="dark"] .editor:focus {
            background: var(--soft-gray);
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        :root[data-theme="dark"] .editor[readonly] {
            background: rgba(139, 92, 246, 0.08);
            color: var(--text-primary);
        }

        :root[data-theme="dark"] .converter-workspace {
            background: var(--card-background);
        }

        :root[data-theme="dark"] .footer {
            background: var(--card-background);
            border-color: var(--border-gray);
        }

        :root[data-theme="dark"] .notification.success {
            background: rgba(16, 185, 129, 0.1);
            color: #86EFAC;
            border-color: #4ADE80;
        }

        :root[data-theme="dark"] .notification.error {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            border-color: #EF4444;
        }
    </style>
</head>
<body>
    <!-- ============================================================
         HEADER
         ============================================================ -->
    <header class="header" role="banner">
        <div class="header-content">
            <div class="header-left">
                <div class="logo" aria-label="Converter logo">⇄</div>
                <div class="header-text">
                    <h1>Markdown & HTML Converter</h1>
                    <p>Convert Markdown and HTML instantly</p>
                </div>
            </div>
            <div class="header-buttons">
                <button 
                    class="header-tab-btn active" 
                    id="tab-md-to-html" 
                    role="tab" 
                    aria-selected="true" 
                    aria-controls="panel-md-to-html"
                    data-tab="md-to-html"
                    onclick="switchTab('md-to-html')">
                    <span>📝</span>
                    <span>Markdown → HTML</span>
                </button>
                <button 
                    class="header-tab-btn" 
                    id="tab-html-to-md" 
                    role="tab" 
                    aria-selected="false" 
                    aria-controls="panel-html-to-md"
                    data-tab="html-to-md"
                    onclick="switchTab('html-to-md')">
                    <span>🏷️</span>
                    <span>HTML → Markdown</span>
                </button>
                <button 
                    class="btn btn-secondary" 
                    id="themeToggleBtn" 
                    type="button"
                    onclick="toggleTheme()">
                    <span>🌙</span>
                    <span>Theme</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ============================================================
         MAIN CONTENT
         ============================================================ -->
    <main class="main" role="main">
        <div class="container">
            <!-- Notification Area -->
            <div id="notificationArea" role="status" aria-live="polite" aria-atomic="true"></div>

            <!-- ============================================================
                 TAB 1: MARKDOWN TO HTML
                 ============================================================ -->
            <div id="panel-md-to-html" class="tab-content active" role="tabpanel" aria-labelledby="tab-md-to-html">
                <div class="converter-workspace">
                    <div class="workspace-grid">
                        <div class="panel">
                            <label class="panel-label">
                                <span class="panel-icon">IN</span>
                                Markdown Input
                            </label>
                            <textarea 
                                id="mdInput" 
                                class="editor" 
                                placeholder="Paste your Markdown code here..."
                                aria-label="Markdown input editor"
                                spellcheck="true">
# Main Heading

## Sub Heading

This is **bold** text.

This is *italic* text.

This is <u>underline</u> text.

This is ==highlight== text.

This is ~~deleted~~ text.

Water = H~2~O

X^2^

[Visit Website](https://example.com)

![Sample Image](image.jpg)

> This is quote block

---

`inline code`

```js
console.log("Hello");
```

- Apple
- Mango

1. HTML
2. Markdown
</textarea>
                        </div>
                        <div class="panel">
                            <label class="panel-label">
                                <span class="panel-icon">OUT</span>
                                HTML Output
                            </label>
                            <textarea 
                                id="htmlOutput" 
                                class="editor" 
                                readonly 
                                placeholder="Your HTML will appear here..."
                                aria-label="HTML output editor"></textarea>
                        </div>
                    </div>
                    <div class="action-bar">
                        <button class="btn btn-primary" id="convertMdBtn" onclick="convertToHTML()">
                            <span>⚡</span>
                            <span>Convert to HTML</span>
                        </button>
                        <button class="btn btn-secondary" id="copyMdBtn" onclick="copyToClipboard('htmlOutput')">
                            <span>📋</span>
                            <span>Copy Output</span>
                        </button>
                        <button class="btn btn-danger" id="clearMdBtn" onclick="clearEditor('mdInput')">
                            <span>🗑️</span>
                            <span>Clear</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- ============================================================
                 TAB 2: HTML TO MARKDOWN
                 ============================================================ -->
            <div id="panel-html-to-md" class="tab-content" role="tabpanel" aria-labelledby="tab-html-to-md">
                <div class="converter-workspace">
                    <div class="workspace-grid">
                        <div class="panel">
                            <label class="panel-label">
                                <span class="panel-icon">IN</span>
                                HTML Input
                            </label>
                            <textarea 
                                id="htmlInput" 
                                class="editor" 
                                placeholder="Paste your HTML code here..."
                                aria-label="HTML input editor"
                                spellcheck="false">
<h1>Main Heading</h1>

<h2>Sub Heading</h2>

<p>This is <b>bold</b> text.</p>

<p>This is <i>italic</i> text.</p>

<p>This is <u>underline</u> text.</p>

<p>This is <mark>highlight</mark> text.</p>

<p>This is <del>deleted</del> text.</p>

<p>Water = H<sub>2</sub>O</p>

<p>X<sup>2</sup></p>

<a href="https://example.com">Visit Website</a>

<img src="image.jpg" alt="Sample Image">

<blockquote>
This is quote block
</blockquote>

<hr>

<pre><code>
console.log("Hello");
</code></pre>

<ul>
<li>Apple</li>
<li>Mango</li>
</ul>

<ol>
<li>HTML</li>
<li>Markdown</li>
</ol>
</textarea>
                        </div>
                        <div class="panel">
                            <label class="panel-label">
                                <span class="panel-icon">OUT</span>
                                Markdown Output
                            </label>
                            <textarea 
                                id="mdOutput" 
                                class="editor" 
                                readonly 
                                placeholder="Your Markdown will appear here..."
                                aria-label="Markdown output editor"></textarea>
                        </div>
                    </div>
                    <div class="action-bar">
                        <button class="btn btn-primary" id="convertHtmlBtn" onclick="convertToMarkdown()">
                            <span>⚡</span>
                            <span>Convert to Markdown</span>
                        </button>
                        <button class="btn btn-secondary" id="copyHtmlBtn" onclick="copyToClipboard('mdOutput')">
                            <span>📋</span>
                            <span>Copy Output</span>
                        </button>
                        <button class="btn btn-danger" id="clearHtmlBtn" onclick="clearEditor('htmlInput')">
                            <span>🗑️</span>
                            <span>Clear</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ============================================================
         FOOTER
         ============================================================ -->
    <footer class="footer" role="contentinfo">
        <div class="footer-content">
            <div class="footer-text">
                <span class="footer-icon">⇄</span>
                <span>Markdown & HTML Converter</span>
                <span class="footer-icon">|</span>
                <span>Professional Developer Tool</span>
            </div>
        </div>
    </footer>

    <!-- ============================================================
         CONVERSION FUNCTIONS
         ============================================================ -->
    <script>
        // ============================================================
        // TAB SWITCHING FUNCTIONALITY
        // ============================================================
        let currentMode = 'md-to-html';

        function switchTab(tabName) {
            if (!tabName) return;

            // Hide all tab contents
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));

            // Remove active class from all buttons
            const buttons = document.querySelectorAll('.header-tab-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
            });

            // Show the selected tab content
            const selectedPanel = document.getElementById('panel-' + tabName);
            if (selectedPanel) {
                selectedPanel.classList.add('active');
            }

            // Add active class to clicked button
            const activeBtn = document.getElementById('tab-' + tabName);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.setAttribute('aria-selected', 'true');
            }

            currentMode = tabName;
            localStorage.setItem('converterMode', tabName);
        }

        function initConverter() {
            const savedTheme = localStorage.getItem('theme');
            const savedMode = localStorage.getItem('converterMode') || 'md-to-html';

            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme('light');
            }

            switchTab(savedMode);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const themeButton = document.getElementById('themeToggleBtn');
            if (themeButton) {
                themeButton.innerHTML = theme === 'dark' ? '<span>☀️</span><span>Theme</span>' : '<span>🌙</span><span>Theme</span>';
            }
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(nextTheme);
        }

        document.addEventListener('DOMContentLoaded', initConverter);

        // ============================================================
        // MARKDOWN TO HTML CONVERSION
        // ============================================================
        function convertToHTML() {
            const mdInputElement = document.getElementById('mdInput');
            const htmlOutput = document.getElementById('htmlOutput');
            if (!mdInputElement || !htmlOutput) {
                showNotification('Required editor not found.', 'error');
                return;
            }

            const mdInput = mdInputElement.value;
            if (!mdInput.trim()) {
                htmlOutput.value = '';
                showNotification('Input is empty!', 'error');
                return;
            }

            let html = mdInput;
            
            // Escape HTML special characters first
            html = escapeHtml(html);
            
            // Process code blocks FIRST (to protect their content)
            const codeBlocks = [];
            html = html.replace(/```([^`]*)```/gs, function(match, code) {
                const blockIndex = codeBlocks.length;
                codeBlocks.push(code.trim());
                return `___CODE_BLOCK_${blockIndex}___`;
            });

            // Process inline code (protect it)
            const inlineCode = [];
            html = html.replace(/`([^`]+)`/g, function(match, code) {
                const codeIndex = inlineCode.length;
                inlineCode.push(code);
                return `___INLINE_CODE_${codeIndex}___`;
            });

            // Process task lists
            html = html.replace(/^\s*-\s*\[([xX ])\]\s+(.+)$/gm, function(match, checkbox, text) {
                const checked = checkbox.toLowerCase() === 'x' ? 'checked' : '';
                return `<li style="list-style: none;"><input type="checkbox" ${checked} disabled /> ${escapeHtml(text)}</li>`;
            });

            // Tables (simple support)
            html = html.replace(/^(\|?.+\|.+\|?.*\n)(\|?\s*[-:]+[-\s|:]*\n)((?:\|?.+\|.+\|?.*\n?)*)/gm, function(match) {
                const lines = match.trim().split('\n');
                if (lines.length < 2) return match;
                
                const headerRow = lines[0].split('|').filter(cell => cell.trim());
                const tableContent = lines.slice(2).map(line => 
                    '<tr>' + line.split('|').filter(cell => cell.trim())
                        .map(cell => `<td>${escapeHtml(cell.trim())}</td>`).join('') + '</tr>'
                ).join('');
                
                return '<table style="border-collapse: collapse; width: 100%;">' +
                    '<thead><tr>' + headerRow.map(h => 
                        `<th style="border: 1px solid #ddd; padding: 8px; text-align: left;">${escapeHtml(h.trim())}</th>`
                    ).join('') + '</tr></thead>' +
                    '<tbody>' + tableContent + '</tbody>' +
                    '</table>';
            });

            // Headings (must be done before other processing)
            html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Horizontal rule
            html = html.replace(/^\s*[-*_]{3,}\s*$/gm, '<hr />');

            // Bold (must be before italic to prevent conflicts)
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Strikethrough
            html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

            // Highlight
            html = html.replace(/==(.+?)==/g, '<mark>$1</mark>');

            // Superscript and subscript
            html = html.replace(/\^(.+?)\^/g, '<sup>$1</sup>');
            html = html.replace(/~(.+?)~/g, '<sub>$1</sub>');

            // Links ![alt](url) and [text](url)
            html = html.replace(/!\[([^\]]*?)\]\(([^)]+?)\)/g, 
                '<img src="$2" alt="$1" style="max-width: 100%; height: auto;" />');
            html = html.replace(/\[([^\]]+?)\]\(([^)]+?)\)/g, 
                '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

            // Process lists
            const lines = html.split('\n');
            let inUnorderedList = false;
            let inOrderedList = false;
            let processedLines = [];
            let listBuffer = [];
            let orderCounter = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const unorderedMatch = line.match(/^\s*[-*+]\s+(.+)$/);
                const orderedMatch = line.match(/^\s*\d+\.\s+(.+)$/);

                if (unorderedMatch) {
                    if (inOrderedList) {
                        processedLines.push('</' + (orderCounter > 1 ? 'ol' : 'ul') + '>');
                        inOrderedList = false;
                    }
                    if (!inUnorderedList) {
                        inUnorderedList = true;
                    }
                    listBuffer.push(`<li>${unorderedMatch[1]}</li>`);
                } else if (orderedMatch) {
                    if (inUnorderedList) {
                        processedLines.push('<ul>' + listBuffer.join('') + '</ul>');
                        listBuffer = [];
                        inUnorderedList = false;
                    }
                    if (!inOrderedList) {
                        inOrderedList = true;
                        orderCounter = 0;
                    }
                    orderCounter++;
                    listBuffer.push(`<li>${orderedMatch[1]}</li>`);
                } else {
                    if (inUnorderedList) {
                        processedLines.push('<ul>' + listBuffer.join('') + '</ul>');
                        listBuffer = [];
                        inUnorderedList = false;
                    }
                    if (inOrderedList) {
                        processedLines.push('<ol>' + listBuffer.join('') + '</ol>');
                        listBuffer = [];
                        inOrderedList = false;
                        orderCounter = 0;
                    }
                    processedLines.push(line);
                }
            }

            if (inUnorderedList) {
                processedLines.push('<ul>' + listBuffer.join('') + '</ul>');
            }
            if (inOrderedList) {
                processedLines.push('<ol>' + listBuffer.join('') + '</ol>');
            }

            html = processedLines.join('\n');

            // Blockquotes
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/(<blockquote>.*<\/blockquote>)/s, function(match) {
                const content = match.replace(/<\/?blockquote>/g, '');
                return `<blockquote style="border-left: 4px solid #7C3AED; padding-left: 16px; margin-left: 0; color: #6b7280;">${content}</blockquote>`;
            });

            // Paragraphs (wrap text that isn't already in tags)
            const blockElements = ['<h[1-6]', '<ul', '<ol', '<hr', '<blockquote', '<table', '<pre', '<img'];
            html = html.split('\n').map(line => {
                if (line.trim() === '') return '';
                const isBlock = blockElements.some(elem => new RegExp(`^${elem}`).test(line));
                if (isBlock) return line;
                return `<p>${line}</p>`;
            }).join('\n');

            // Restore code blocks with syntax preservation
            codeBlocks.forEach((code, index) => {
                const langMatch = code.match(/^(\w+)\n([\s\S]*)/)
                const language = langMatch ? langMatch[1] : '';
                const codeContent = langMatch ? langMatch[2] : code;
                html = html.replace(
                    `___CODE_BLOCK_${index}___`,
                    `<pre><code class="language-${language}">${escapeHtml(codeContent)}</code></pre>`
                );
            });

            // Restore inline code
            inlineCode.forEach((code, index) => {
                html = html.replace(
                    `___INLINE_CODE_${index}___`,
                    `<code style="background: #f3f4f6; padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 0.9em;">${escapeHtml(code)}</code>`
                );
            });

            // Clean up extra spaces
            html = html.replace(/\n\n+/g, '\n');
            html = html.trim();

            htmlOutput.value = html;
            showNotification('✓ Markdown converted to HTML successfully!', 'success');
        }

        // Helper function to escape HTML special characters
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============================================================
        // HTML TO MARKDOWN CONVERSION
        // ============================================================
        function convertToMarkdown() {
            const htmlInputElement = document.getElementById('htmlInput');
            const mdOutput = document.getElementById('mdOutput');
            if (!htmlInputElement || !mdOutput) {
                showNotification('Required editor not found.', 'error');
                return;
            }

            const htmlInput = htmlInputElement.value;
            if (!htmlInput.trim()) {
                mdOutput.value = '';
                showNotification('Input is empty!', 'error');
                return;
            }

            let md = htmlInput;

            // Headings
            md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gis, "# $1\n");
            md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gis, "## $1\n");
            md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gis, "### $1\n");
            md = md.replace(/<h4[^>]*>(.*?)<\/h4>/gis, "#### $1\n");
            md = md.replace(/<h5[^>]*>(.*?)<\/h5>/gis, "##### $1\n");
            md = md.replace(/<h6[^>]*>(.*?)<\/h6>/gis, "###### $1\n");

            // Bold (must be before italic)
            md = md.replace(/<(b|strong)[^>]*>(.*?)<\/(b|strong)>/gis, "**$2**");

            // Italic
            md = md.replace(/<(i|em)[^>]*>(.*?)<\/(i|em)>/gis, "*$2*");

            // Underline
            md = md.replace(/<u[^>]*>(.*?)<\/u>/gis, "<u>$1</u>");

            // Highlight
            md = md.replace(/<mark[^>]*>(.*?)<\/mark>/gis, "==$1==");

            // Strikethrough
            md = md.replace(/<(del|strike)[^>]*>(.*?)<\/(del|strike)>/gis, "~~$2~~");

            // Superscript
            md = md.replace(/<sup[^>]*>(.*?)<\/sup>/gis, "^$1^");

            // Subscript
            md = md.replace(/<sub[^>]*>(.*?)<\/sub>/gis, "~$1~");

            // Inline code
            md = md.replace(/<code[^>]*>(.*?)<\/code>/gis, "`$1`");

            // Code blocks
            md = md.replace(/<pre[^>]*><code[^>]*>([\s\S]*?)<\/code><\/pre>/gis, "```\n$1\n```");

            // Paragraph
            md = md.replace(/<p[^>]*>(.*?)<\/p>/gis, "$1\n");

            // Hyperlink
            md = md.replace(
                /<a\s+href=["'](.*?)["'][^>]*>(.*?)<\/a>/gis,
                "[$2]($1)"
            );

            // Image
            md = md.replace(
                /<img\s+src=["'](.*?)["'][^>]*alt=["'](.*?)["'][^>]*\/?>/gis,
                "![$2]($1)"
            );
            md = md.replace(
                /<img\s+alt=["'](.*?)["'][^>]*src=["'](.*?)["'][^>]*\/?>/gis,
                "![$1]($2)"
            );

            // Quote block
            md = md.replace(
                /<blockquote[^>]*>(.*?)<\/blockquote>/gis,
                "> $1\n"
            );

            // Horizontal rule
            md = md.replace(/<hr\s*\/?>/gis, "---\n");

            // Unordered lists
            md = md.replace(/<ul[^>]*>/gis, "");
            md = md.replace(/<\/ul[^>]*>/gis, "");
            md = md.replace(/<li[^>]*>(.*?)<\/li>/gis, "- $1\n");

            // Ordered lists
            md = md.replace(/<ol[^>]*>/gis, "");
            md = md.replace(/<\/ol[^>]*>/gis, "");

            // Ordered list items with counter
            let olCounter = 0;
            md = md.replace(/<li[^>]*>(.*?)<\/li>/gis, function() {
                olCounter++;
                return olCounter + ". " + arguments[1] + "\n";
            });

            // Remove extra spaces
            md = md.replace(/\n\n\n+/g, "\n\n");
            md = md.trim();

            mdOutput.value = md;
            showNotification('Markdown generated successfully!', 'success');
        }

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            if (!element || !element.value.trim()) {
                showNotification('Nothing to copy!', 'error');
                return;
            }

            navigator.clipboard.writeText(element.value).then(() => {
                showNotification('Copied Successfully', 'success');
            }).catch(() => {
                // Fallback method
                element.select();
                document.execCommand('copy');
                showNotification('Copied Successfully', 'success');
            });
        }

        function clearEditor(elementId) {
            const inputElement = document.getElementById(elementId);
            if (!inputElement) {
                showNotification('Editor not found!', 'error');
                return;
            }

            inputElement.value = '';

            const outputId = elementId === 'mdInput' ? 'htmlOutput' : elementId === 'htmlInput' ? 'mdOutput' : null;
            if (outputId) {
                const outputElement = document.getElementById(outputId);
                if (outputElement) {
                    outputElement.value = '';
                }
            }

            inputElement.focus();
            showNotification('Editor cleared', 'success');
        }

        function showNotification(message, type = 'success') {
            const notificationArea = document.getElementById('notificationArea');
            
            // Remove existing notifications
            notificationArea.innerHTML = '';
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            notificationArea.appendChild(notification);
            
            // Auto-remove after 3 seconds
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 3000);
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter or Cmd+Enter to convert
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                const activeTab = document.querySelector('.header-tab-btn.active');
                if (activeTab && activeTab.dataset.tab === 'md-to-html') {
                    convertToHTML();
                } else {
                    convertToMarkdown();
                }
                e.preventDefault();
            }

            // Tab switching with Ctrl+Number
            if (e.ctrlKey && e.key === '1') {
                switchTab('md-to-html');
                e.preventDefault();
            }
            if (e.ctrlKey && e.key === '2') {
                switchTab('html-to-md');
                e.preventDefault();
            }
        });
    </script>
